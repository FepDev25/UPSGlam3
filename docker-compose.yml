services:

  # Servicio de inferencia con GPU (Python + FastAPI)
  cuda-service:
    build: ./gpu-service
    ports:
      - "8000:8000"       # esta exponiendo el puerto 8000 para FastAPI
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - upsglam-net

  # Backend principal (Java + Spring Boot)
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env        # carga todas las variables de .env
    environment:
      CUDA_SERVICE_URL: http://cuda-service:8000   # hostname interno de Docker
    depends_on:
      cuda-service:
        condition: service_healthy
    networks:
      - upsglam-net

# es la red interna para que los servicios se comuniquen entre sí
networks:
  upsglam-net:
    driver: bridge
